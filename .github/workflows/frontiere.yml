name: frontiere

on:
  schedule:
    - cron: "0 11 * * 1,4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install -r pipeline/requirements.txt

      - name: Installer Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Demarrer Ollama et telecharger le modele
        run: |
          # Le script d'installation demarre deja un service systemd Ollama ;
          # ne relancer "ollama serve" que s'il n'ecoute pas encore.
          if ! curl -sf http://localhost:11434/ >/dev/null; then
            ollama serve &
            for i in $(seq 1 30); do
              curl -sf http://localhost:11434/ >/dev/null && break
              sleep 1
            done
          fi
          ollama pull qwen2.5:3b

      - name: Executer le pipeline
        env:
          FRONTIERE_LLM: ollama
          OLLAMA_MODEL: qwen2.5:3b
        run: |
          python pipeline/collect.py
          python pipeline/curate.py
          python pipeline/publish.py

      - name: Committer si changements
        run: |
          git config user.name "frontiere-bot"
          git config user.email "actions@github.com"
          git add frontiere/ pipeline/seen.json
          git diff --cached --quiet || git commit -m "frontiere: mise a jour automatique $(date -u +%F)"
          git push
