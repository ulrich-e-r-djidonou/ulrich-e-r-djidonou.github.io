name: frontiere

on:
  schedule:
    - cron: "0 11 * * 1,4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install -r pipeline/requirements.txt

      - name: Executer le pipeline
        run: |
          python pipeline/collect.py
          python pipeline/curate.py
          python pipeline/publish.py

      - name: Committer si changements
        run: |
          git config user.name "frontiere-bot"
          git config user.email "actions@github.com"
          git add frontiere/ pipeline/seen.json
          git diff --cached --quiet || git commit -m "frontiere: mise a jour automatique $(date -u +%F)"
          git push
